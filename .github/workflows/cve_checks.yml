name: "Infra: CVE checks"

on:
  pull_request:
    types: [ "opened", "reopened", "synchronize" ]
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      tags-to-scan:
        description: 'Tags to scan (comma-separated, e.g. "1.4.2,1.5.0" or "v1.4.2,v1.5.0")'
        required: false
        default: ''
        type: string
  schedule:
    - cron: '0 8 15 * *'

permissions:
  contents: read

jobs:
  # 🔍 Автоматическое разрешение тегов
  prepare:
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.resolve.outputs.targets }}
      is-manual: ${{ steps.resolve.outputs.is-manual }}
    steps:
      - uses: actions/checkout@1e31de5234b9f8995739874a8ce0492dc87873e2
        with:
          fetch-depth: 0
          fetch-tags: true
      - id: resolve
        run: |
          resolve_tag() {
            local input="$1"
            if git rev-parse -q --verify "refs/tags/$input" >/dev/null 2>&1; then echo "$input"; return 0; fi
            if [[ ! "$input" =~ ^v ]]; then
              if git rev-parse -q --verify "refs/tags/v$input" >/dev/null 2>&1; then echo "v$input"; return 0; fi
            fi
            if [[ "$input" =~ ^v ]]; then
              local without_v="${input#v}"
              if git rev-parse -q --verify "refs/tags/$without_v" >/dev/null 2>&1; then echo "$without_v"; return 0; fi
            fi
            echo "$input"; return 1
          }
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.tags-to-scan }}" ]]; then
            IFS=',' read -ra RAW_TAGS <<< "${{ inputs.tags-to-scan }}"
            RESOLVED=()
            for tag in "${RAW_TAGS[@]}"; do
              tag=$(echo "$tag" | xargs)
              resolved=$(resolve_tag "$tag")
              RESOLVED+=("\"$resolved\"")
            done
            echo "targets=[$(IFS=,; echo "${RESOLVED[*]}")]" >> $GITHUB_OUTPUT
            echo "is-manual=true" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "targets=[\"${{ github.event.pull_request.head.sha }}\"]" >> $GITHUB_OUTPUT
            echo "is-manual=false" >> $GITHUB_OUTPUT
          else
            echo "targets=[\"main\"]" >> $GITHUB_OUTPUT
            echo "is-manual=false" >> $GITHUB_OUTPUT
          fi

  # 🛡️ Быстрая матричная проверка уязвимостей
  check-cves:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 12
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.prepare.outputs.targets) }}
    steps:
      - name: Checkout ${{ matrix.target }}
        uses: actions/checkout@1e31de5234b9f8995739874a8ce0492dc87873e2
        with:
          ref: ${{ matrix.target }}
          fetch-depth: 0
          fetch-tags: true
      - name: Cache Grype DB
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf
        with:
          path: ~/.cache/grype/db
          key: grype-db-${{ runner.os }}-v5
          restore-keys: grype-db-${{ runner.os }}-
      - name: Install Grype
        run: curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
      - name: Scan Frontend Dependencies
        run: grype dir:frontend --output json > grype-front.json 2>/dev/null || true
      - name: Set up JDK
        uses: actions/setup-java@3a4f6e1af504cf6a31855fa899c6aa5355ba6c12
        with:
          java-version-file: '.java-version'
          distribution: 'zulu'
          cache: 'gradle'
      - name: Build project (${{ matrix.target }})
        id: build
        run: |
          ./gradlew clean build -x test -Pbuild-docker-images=true -Pinclude-frontend=true -Pversion=${{ matrix.target }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2
      - name: Cache Docker layers
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ matrix.target }}
          restore-keys: |
            ${{ runner.os }}-buildx-
      - name: Build docker image (${{ matrix.target }})
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: api
          platforms: linux/amd64
          push: false
          load: true
          tags: ghcr.io/kafbat/kafka-ui:${{ matrix.target }}
          build-args: JAR_FILE=build/libs/api-${{ matrix.target }}.jar
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache
      - name: Scan Docker Image
        run: grype docker:ghcr.io/kafbat/kafka-ui:${{ matrix.target }} --output json > grype-docker.json 2>/dev/null || true

      # 📊 Финальный отчёт + конвертация GHSA → CVE через OSV API
      - name: 📊 CVE Summary & Exit Status
        if: always()
        run: |
          echo "🔍 ================= CVE REPORT ================="
          echo "🎯 Target: ${{ matrix.target }}"
          echo ""

          FRONTEND="grype-front.json"
          DOCKER="grype-docker.json"

          # 1. Извлекаем HIGH/CRITICAL простым фильтром (не ломается)
          parse_json() {
            if [ -f "$1" ] && [ -s "$1" ]; then
              jq -r '
                .matches[]? |
                select(.vulnerability.severity == "High" or .vulnerability.severity == "Critical") |
                "\(.vulnerability.id)|\(.vulnerability.severity)|\(.artifact.name):\(.artifact.version)|\((.vulnerability.fix.versions // ["N/A"])[0])"
              ' "$1"
            fi
          }

          { parse_json "$FRONTEND"; parse_json "$DOCKER"; } | sort -u > cves_filtered.txt

          # 2. Конвертация оставшихся GHSA- → CVE- через открытый API OSV.dev
          if [ -s cves_filtered.txt ] && grep -q "^GHSA-" cves_filtered.txt; then
            echo "🔄 Converting remaining GHSA IDs via OSV API..."
            GHSA_LIST=$(grep "^GHSA-" cves_filtered.txt | cut -d'|' -f1 | sort -u)
            for ghsa in $GHSA_LIST; do
              # Запрос к OSV с таймаутом 5 сек
              cve=$(curl -s --max-time 5 "https://api.osv.dev/v1/vulns/$ghsa" 2>/dev/null | jq -r '.database_specific?.cve_id // empty' 2>/dev/null)
              if [[ -n "$cve" && "$cve" =~ ^CVE- ]]; then
                echo "  ℹ️ $ghsa → $cve"
                # Заменяем только первый столбец (до символа |)
                sed -i "s/^${ghsa}|/${cve}|/" cves_filtered.txt
              fi
            done
          fi

          # 3. Вывод финальной таблицы
          COUNT=$(wc -l < cves_filtered.txt | tr -d ' ')

          if [ "$COUNT" -gt 0 ]; then
            printf "%-22s | %-10s | %-35s | %-12s\n" "CVE" "Severity" "Package" "Fixed In"
            echo "-----------------------|------------|-------------------------------------|-------------"
            while IFS='|' read -r cve sev pkg fix; do
              printf "%-22s | %-10s | %-35s | %-12s\n" "$cve" "$sev" "$pkg" "$fix"
            done < cves_filtered.txt
            echo ""
            echo "❌ Found $COUNT HIGH/CRITICAL CVEs."
            exit 1
          else
            echo "✅ No HIGH/CRITICAL CVEs detected."
            exit 0
          fi

  # 📢 Уведомление (только для расписания)
  notify:
    needs: [ prepare, check-cves ]
    if: ${{ always() && needs.prepare.outputs.is-manual == 'false' && github.event_name == 'schedule' && needs.check-cves.result == 'failure' }}
    uses: ./.github/workflows/infra_discord_hook.yml
    with:
      message: "⚠️ Scheduled CVE checks failed! Review: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
    secrets:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL_CVE }}
