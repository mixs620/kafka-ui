name: "Infra: CVE checks"

on:
  pull_request:
    types: [ "opened", "reopened", "synchronize" ]
  push:
    branches: [ "main" ]
  workflow_dispatch:
  schedule:
    - cron: '0 8 15 * *'

permissions:
  contents: read

jobs:
  # 🔍 Шаг 1: Автоматический сбор списка целей (все теги или текущий реф)
  prepare:
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.set-targets.outputs.targets }}
    steps:
      - uses: actions/checkout@1e31de5234b9f8995739874a8ce0492dc87873e2 # v4.0.0
        with:
          fetch-depth: 0

      - id: set-targets
        run: |
          if [[ "${{ github.event_name }}" == "schedule" || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # Ищем все теги, соответствующие семантическому версионированию (1.5.0, v1.4.2 и т.д.)
            TAGS=$(git tag -l --sort=-v:refname | grep -E '^[v]?[0-9]+\.[0-9]+\.[0-9]+$')
            if [[ -z "$TAGS" ]]; then
              echo "targets=[\"main\"]" >> $GITHUB_OUTPUT
            else
              # Формируем JSON массив без внешних зависимостей: ["1.5.0","1.4.2",...]
              JSON_ARR=$(echo "$TAGS" | sed 's/.*/"&"/' | paste -sd ',' -)
              echo "targets=[${JSON_ARR}]" >> $GITHUB_OUTPUT
            fi
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "targets=[\"${{ github.event.pull_request.head.sha }}\"]" >> $GITHUB_OUTPUT
          else
            echo "targets=[\"${{ github.ref_name }}\"]" >> $GITHUB_OUTPUT
          fi

  # 🛡️ Шаг 2: Матричная проверка каждой цели
  check-cves:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # Проверяем все теги, даже если один упал
      matrix:
        target: ${{ fromJson(needs.prepare.outputs.targets) }}

    steps:
      - name: Checkout ${{ matrix.target }}
        uses: actions/checkout@1e31de5234b9f8995739874a8ce0492dc87873e2 # v4.0.0
        with:
          ref: ${{ matrix.target }}
          fetch-depth: 0
          fetch-tags: true

      - name: Run frontend dependency CVE checks
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: "fs"
          scan-ref: "frontend"
          severity: "CRITICAL,HIGH"
          format: "table"
          exit-code: "1"

      - name: Set up JDK
        uses: actions/setup-java@3a4f6e1af504cf6a31855fa899c6aa5355ba6c12 # v4
        with:
          java-version-file: '.java-version'
          distribution: 'zulu'
          cache: 'gradle'

      - name: Build project
        run: |
          ./gradlew clean build \
          -x test \
          -Pbuild-docker-images=true \
          -Pinclude-frontend=true \
          -Pversion=${{ matrix.target }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.7.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.11.1

      - name: Cache Docker layers
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.3.0
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ matrix.target }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build docker image
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4 # v6.18.0
        with:
          context: api
          platforms: linux/amd64
          push: false
          load: true
          tags: |
            ghcr.io/kafbat/kafka-ui:${{ matrix.target }}
          build-args: |
            JAR_FILE=build/libs/api-${{ matrix.target }}.jar
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache

      - name: Run Docker image CVE checks
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: "ghcr.io/kafbat/kafka-ui:${{ matrix.target }}"
          severity: "CRITICAL,HIGH"
          format: "table"
          exit-code: "1"

  # 📢 Шаг 3: Уведомление (только для расписания)
  notify:
    needs: check-cves
    if: ${{ always() && needs.check-cves.result == 'failure' && github.event_name == 'schedule' }}
    uses: ./.github/workflows/infra_discord_hook.yml
    with:
      message: "⚠️ Scheduled CVE checks failed! Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
    secrets:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL_CVE }}
