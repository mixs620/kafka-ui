name: "Infra: CVE checks"

on:
  pull_request:
    types: [ "opened", "reopened", "synchronize" ]
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      scan-target:
        description: 'Target to scan (tag/branch)'
        required: true
        default: 'main'
        type: choice
        options:
          - main
          - 1.4.2
          - 1.5.0
          - custom
      custom-ref:
        description: 'Custom ref (branch/tag/commit) - используется только если выбрано "custom"'
        required: false
        default: ''
        type: string
  schedule:
    - cron: '0 8 15 * *'

permissions:
  contents: read

jobs:
  # 🔍 Определяем правильный ref и глубину клонирования
  resolve-ref:
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.resolve.outputs.ref }}
      fetch-depth: ${{ steps.resolve.outputs.fetch-depth }}
    steps:
      - id: resolve
        run: |
          EVENT="${{ github.event_name }}"
          if [[ "$EVENT" == "workflow_dispatch" ]]; then
            TARGET="${{ inputs.scan-target }}"
            CUSTOM="${{ inputs.custom-ref }}"
            
            if [[ "$TARGET" == "custom" && -n "$CUSTOM" ]]; then
              REF="$CUSTOM"
            else
              REF="$TARGET"
            fi
            
            # Автоматически преобразуем семантические версии в полный путь тега
            if [[ "$REF" =~ ^[vV]?[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "ref=refs/tags/$REF" >> $GITHUB_OUTPUT
            else
              echo "ref=$REF" >> $GITHUB_OUTPUT
            fi
            # Для ручного запуска всегда берём полную историю, чтобы теги разрешались корректно
            echo "fetch-depth=0" >> $GITHUB_OUTPUT
          elif [[ "$EVENT" == "pull_request" ]]; then
            echo "ref=${{ github.event.pull_request.head.sha }}" >> $GITHUB_OUTPUT
            echo "fetch-depth=1" >> $GITHUB_OUTPUT
          else
            # push или schedule
            echo "ref=${{ github.ref }}" >> $GITHUB_OUTPUT
            echo "fetch-depth=1" >> $GITHUB_OUTPUT
          fi

  check-frontend-cves:
    needs: resolve-ref
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@1e31de5234b9f8995739874a8ce0492dc87873e2 # v4.0.0
        with:
          token: ${{ github.token }}
          ref: ${{ needs.resolve-ref.outputs.ref }}
          fetch-depth: ${{ needs.resolve-ref.outputs.fetch-depth }}
          fetch-tags: true

      - name: Run frontend dependency CVE checks
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: "fs"
          scan-ref: "frontend"
          severity: "CRITICAL,HIGH"
          format: "table"
          exit-code: "1"

  check-docker-cves:
    needs: resolve-ref
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@1e31de5234b9f8995739874a8ce0492dc87873e2 # v4.0.0
        with:
          token: ${{ github.token }}
          ref: ${{ needs.resolve-ref.outputs.ref }}
          fetch-depth: ${{ needs.resolve-ref.outputs.fetch-depth }}
          fetch-tags: true

      - name: Set up JDK
        uses: actions/setup-java@3a4f6e1af504cf6a31855fa899c6aa5355ba6c12 # v4
        with:
          java-version-file: '.java-version'
          distribution: 'zulu'
          cache: 'gradle'

      - name: Build project
        id: build
        run: |
          ./gradlew clean build \
          -x test \
          -Pbuild-docker-images=true \
          -Pinclude-frontend=true \
          -Pversion=latest

      - name: Set up QEMU
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.7.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.11.1

      - name: Cache Docker layers
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.3.0
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build docker image
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4 # v6.18.0
        with:
          context: api
          platforms: linux/amd64
          push: false
          load: true
          tags: |
            ghcr.io/kafbat/kafka-ui:latest
          build-args: |
            JAR_FILE=build/libs/api-latest.jar
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache

      - name: Run Docker image CVE checks
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: "ghcr.io/kafbat/kafka-ui:latest"
          severity: "CRITICAL,HIGH"
          format: "table"
          exit-code: "1"

  notify:
    needs: [ check-frontend-cves, check-docker-cves ]
    if: ${{ always() && (needs.check-frontend-cves.result == 'failure' || needs.check-docker-cves.result == 'failure') && github.event_name == 'schedule' }}
    uses: ./.github/workflows/infra_discord_hook.yml
    with:
      message: "⚠️ Scheduled CVE checks failed for ${{ needs.resolve-ref.outputs.ref }}! Please fix."
    secrets:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL_CVE }}
