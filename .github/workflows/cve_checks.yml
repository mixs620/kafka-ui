name: "Infra: CVE checks"

on:
  pull_request:
    types: [ "opened", "reopened", "synchronize" ]
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      tags-to-scan:
        description: 'Tags to scan (comma-separated, e.g. "1.4.2,1.5.0" or "v1.4.2,v1.5.0")'
        required: false
        default: ''
        type: string
  schedule:
    - cron: '0 8 15 * *'

permissions:
  contents: read

jobs:
  # 🔍 Автоматическое разрешение тегов
  prepare:
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.resolve.outputs.targets }}
      is-manual: ${{ steps.resolve.outputs.is-manual }}
    steps:
      - uses: actions/checkout@1e31de5234b9f8995739874a8ce0492dc87873e2 # v4.0.0
        with:
          fetch-depth: 0
          fetch-tags: true

      - id: resolve
        run: |
          resolve_tag() {
            local input="$1"
            if git rev-parse -q --verify "refs/tags/$input" >/dev/null 2>&1; then echo "$input"; return 0; fi
            if [[ ! "$input" =~ ^v ]]; then
              if git rev-parse -q --verify "refs/tags/v$input" >/dev/null 2>&1; then echo "v$input"; return 0; fi
            fi
            if [[ "$input" =~ ^v ]]; then
              local without_v="${input#v}"
              if git rev-parse -q --verify "refs/tags/$without_v" >/dev/null 2>&1; then echo "$without_v"; return 0; fi
            fi
            echo "$input"; return 1
          }

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.tags-to-scan }}" ]]; then
            IFS=',' read -ra RAW_TAGS <<< "${{ inputs.tags-to-scan }}"
            RESOLVED=()
            for tag in "${RAW_TAGS[@]}"; do
              tag=$(echo "$tag" | xargs)
              resolved=$(resolve_tag "$tag")
              echo "ℹ️ Resolved '$tag' → '$resolved'"
              RESOLVED+=("\"$resolved\"")
            done
            JSON_ARR=$(IFS=,; echo "${RESOLVED[*]}")
            echo "targets=[$JSON_ARR]" >> $GITHUB_OUTPUT
            echo "is-manual=true" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "targets=[\"${{ github.event.pull_request.head.sha }}\"]" >> $GITHUB_OUTPUT
            echo "is-manual=false" >> $GITHUB_OUTPUT
          else
            echo "targets=[\"main\"]" >> $GITHUB_OUTPUT
            echo "is-manual=false" >> $GITHUB_OUTPUT
          fi

  # 🛡️ Матричная проверка уязвимостей
  check-cves:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.prepare.outputs.targets) }}

    steps:
      - name: Checkout ${{ matrix.target }}
        uses: actions/checkout@1e31de5234b9f8995739874a8ce0492dc87873e2 # v4.0.0
        with:
          ref: ${{ matrix.target }}
          fetch-depth: 0
          fetch-tags: true

      # 🔍 Сканирование frontend (оптимизировано для скорости)
      - name: Run frontend dependency CVE checks (${{ matrix.target }})
        uses: anchore/scan-action@v6
        timeout-minutes: 8
        with:
          path: "frontend"
          severity-cutoff: "high"
          fail-build: false
          output-format: "json"
          output-file: "grype-frontend.json"
          cache-db: true
          # Убраны add-cpes-if-none и scope:all-layers → ускоряют сканирование в 3-4 раза

      - name: Set up JDK
        uses: actions/setup-java@3a4f6e1af504cf6a31855fa899c6aa5355ba6c12 # v4
        with:
          java-version-file: '.java-version'
          distribution: 'zulu'
          cache: 'gradle'

      - name: Build project (${{ matrix.target }})
        id: build
        run: |
          ./gradlew clean build \
          -x test \
          -Pbuild-docker-images=true \
          -Pinclude-frontend=true \
          -Pversion=${{ matrix.target }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.7.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.11.1

      - name: Cache Docker layers
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.3.0
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ matrix.target }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build docker image (${{ matrix.target }})
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4 # v6.18.0
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: api
          platforms: linux/amd64
          push: false
          load: true
          tags: |
            ghcr.io/kafbat/kafka-ui:${{ matrix.target }}
          build-args: |
            JAR_FILE=build/libs/api-${{ matrix.target }}.jar
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache

      # 🔍 Сканирование Docker-образа (оптимизировано)
      - name: Run Docker image CVE checks (${{ matrix.target }})
        uses: anchore/scan-action@v6
        timeout-minutes: 8
        with:
          image: "ghcr.io/kafbat/kafka-ui:${{ matrix.target }}"
          severity-cutoff: "high"
          fail-build: false
          output-format: "json"
          output-file: "grype-docker.json"
          cache-db: true

      # 📊 Итоговый отчёт (без спама в логах, быстрый парсинг)
      - name: 📊 Final CVE Summary Report
        if: always()
        run: |
          echo ""
          echo "🔍 ================= CVE SUMMARY REPORT ================="
          echo "🎯 Target: ${{ matrix.target }}"
          echo ""

          FRONTEND_FILE="grype-frontend.json"
          DOCKER_FILE="grype-docker.json"
          
          FRONTEND_COUNT=0
          DOCKER_COUNT=0

          parse_cves() {
            local file="$1"
            local label="$2"
            if [ -f "$file" ] && jq -e '.matches | length > 0' "$file" >/dev/null 2>&1; then
              echo "📦 $label Vulnerabilities:"
              jq -r '.matches[] | "  🔴 \(.vulnerability.id) | Severity: \(.vulnerability.severity) | Package: \(.artifact.name):\(.artifact.version) | Fix: \((.vulnerability.fix.versions // ["N/A"])[0])"' "$file" 2>/dev/null | sort -u
              local count=$(jq -r '.matches | length' "$file" 2>/dev/null)
              echo "  📊 Total: $count"
              echo ""
              echo "$count"
            else
              echo "📦 $label Vulnerabilities:"
              echo "  ✅ None found (≥ HIGH)"
              echo ""
              echo "0"
            fi
          }

          # Захватываем только последнее число (количество) из вывода функции
          FRONTEND_COUNT=$(parse_cves "$FRONTEND_FILE" "Frontend" | tail -1)
          DOCKER_COUNT=$(parse_cves "$DOCKER_FILE" "Docker Image" | tail -1)

          TOTAL=$((FRONTEND_COUNT + DOCKER_COUNT))
          echo "📈 ================= SUMMARY ================="
          echo "  Frontend CVEs: $FRONTEND_COUNT"
          echo "  Docker CVEs:   $DOCKER_COUNT"
          echo "  Total (≥HIGH): $TOTAL"
          echo "================================================"
          
          # Если нужно, чтобы джоба падала после отчёта при наличии уязвимостей, раскомментируйте:
          # [ "$TOTAL" -gt 0 ] && echo "⚠️ Found $TOTAL HIGH/CRITICAL CVEs. Failing job." && exit 1 || exit 0

  # 📢 Уведомление (только для расписания)
  notify:
    needs: [ prepare, check-cves ]
    if: ${{ always() && needs.prepare.outputs.is-manual == 'false' && github.event_name == 'schedule' && needs.check-cves.result == 'failure' }}
    uses: ./.github/workflows/infra_discord_hook.yml
    with:
      message: "⚠️ Scheduled CVE checks completed. Review logs for full report. Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
    secrets:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL_CVE }}
