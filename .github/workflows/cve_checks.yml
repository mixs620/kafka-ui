name: "Infra: CVE checks"

on:
  pull_request:
    types: [ "opened", "reopened", "synchronize" ]
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      tags-to-scan:
        description: 'Tags to scan (comma-separated, e.g. "1.4.2,1.5.0" or "v1.4.2,v1.5.0")'
        required: false
        default: ''
        type: string
  schedule:
    - cron: '0 8 15 * *'

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.resolve.outputs.targets }}
      is-manual: ${{ steps.resolve.outputs.is-manual }}
    steps:
      - uses: actions/checkout@1e31de5234b9f8995739874a8ce0492dc87873e2 # v4.0.0
        with:
          fetch-depth: 0
          fetch-tags: true

      - id: resolve
        run: |
          resolve_tag() {
            local input="$1"
            if git rev-parse -q --verify "refs/tags/$input" >/dev/null 2>&1; then echo "$input"; return 0; fi
            if [[ ! "$input" =~ ^v ]]; then
              if git rev-parse -q --verify "refs/tags/v$input" >/dev/null 2>&1; then echo "v$input"; return 0; fi
            fi
            if [[ "$input" =~ ^v ]]; then
              local without_v="${input#v}"
              if git rev-parse -q --verify "refs/tags/$without_v" >/dev/null 2>&1; then echo "$without_v"; return 0; fi
            fi
            echo "$input"; return 1
          }

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.tags-to-scan }}" ]]; then
            IFS=',' read -ra RAW_TAGS <<< "${{ inputs.tags-to-scan }}"
            RESOLVED=()
            for tag in "${RAW_TAGS[@]}"; do
              tag=$(echo "$tag" | xargs)
              resolved=$(resolve_tag "$tag")
              echo "ℹ️ Resolved '$tag' → '$resolved'"
              RESOLVED+=("\"$resolved\"")
            done
            JSON_ARR=$(IFS=,; echo "${RESOLVED[*]}")
            echo "targets=[$JSON_ARR]" >> $GITHUB_OUTPUT
            echo "is-manual=true" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "targets=[\"${{ github.event.pull_request.head.sha }}\"]" >> $GITHUB_OUTPUT
            echo "is-manual=false" >> $GITHUB_OUTPUT
          else
            echo "targets=[\"main\"]" >> $GITHUB_OUTPUT
            echo "is-manual=false" >> $GITHUB_OUTPUT
          fi

  check-cves:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 12
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.prepare.outputs.targets) }}

    steps:
      - name: Checkout ${{ matrix.target }}
        uses: actions/checkout@1e31de5234b9f8995739874a8ce0492dc87873e2 # v4.0.0
        with:
          ref: ${{ matrix.target }}
          fetch-depth: 0
          fetch-tags: true

      - name: Cache Grype DB
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.3.0
        with:
          path: ~/.cache/grype/db
          key: grype-db-${{ runner.os }}-v5
          restore-keys: grype-db-${{ runner.os }}-

      - name: Install Grype
        run: curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Scan Frontend Dependencies
        run: grype dir:frontend --output json > grype-front.json 2>/dev/null || true

      - name: Set up JDK
        uses: actions/setup-java@3a4f6e1af504cf6a31855fa899c6aa5355ba6c12 # v4
        with:
          java-version-file: '.java-version'
          distribution: 'zulu'
          cache: 'gradle'

      - name: Build project (${{ matrix.target }})
        id: build
        run: |
          ./gradlew clean build \
          -x test \
          -Pbuild-docker-images=true \
          -Pinclude-frontend=true \
          -Pversion=${{ matrix.target }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.7.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.11.1

      - name: Cache Docker layers
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.3.0
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ matrix.target }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build docker image (${{ matrix.target }})
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4 # v6.18.0
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: api
          platforms: linux/amd64
          push: false
          load: true
          tags: |
            ghcr.io/kafbat/kafka-ui:${{ matrix.target }}
          build-args: |
            JAR_FILE=build/libs/api-${{ matrix.target }}.jar
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache

      - name: Scan Docker Image
        run: grype docker:ghcr.io/kafbat/kafka-ui:${{ matrix.target }} --output json > grype-docker.json 2>/dev/null || true

      # 📊 Финальный отчёт: CVE-формат, сортировка по критичности, столбец описания
      - name: 📊 CVE Summary & Exit Status
        if: always()
        run: |
          echo "🔍 ================= CVE REPORT ================="
          echo "🎯 Target: ${{ matrix.target }}"
          echo ""

          FRONTEND="grype-front.json"
          DOCKER="grype-docker.json"

          # Парсинг, резолв GHSA->CVE, нормализация и подготовка к сортировке
          parse_json() {
            if [ -f "$1" ]; then
              jq -r '
                .matches[] |
                select(.vulnerability.severity == "Critical" or .vulnerability.severity == "High") |
                {
                  main_id: (.vulnerability.id // ""),
                  related_ids: [.vulnerability.relatedVulnerabilities[]?.id // ""] | map(select(. != "")),
                  severity: .vulnerability.severity,
                  pkg: "\(.artifact.name):\(.artifact.version)",
                  fix: (((.vulnerability.fix.versions // [])[0]) // "N/A"),
                  desc: (.vulnerability.description // "No description available")
                } |
                # Резолв в CVE: ищем CVE в связанных или берём основной
                ((.related_ids + [.main_id]) | map(select(startswith("CVE-"))) | .[0] // .main_id) as $cve |
                # Ранг для сортировки: 1=Critical, 2=High
                (if .severity == "Critical" then 1 elif .severity == "High" then 2 else 3 end) as $rank |
                # Очистка и обрезка описания
                .desc = (.desc | gsub("[\n\r\t]"; " ") | gsub("  +"; " ") | .[0:65] + (if (.desc | length) > 65 then "..." else "" end)) |
                "\($rank)|\($cve)|\(.severity)|\(.pkg)|\(.fix)|\(.desc)"
              ' "$1" 2>/dev/null
            fi
          }

          # Объединяем, сортируем (Critical → High, затем по CVE), убираем дубли
          { parse_json "$FRONTEND"; parse_json "$DOCKER"; } | \
            sort -t'|' -k1,1n -k2,2 | \
            uniq | \
            cut -d'|' -f2- > cves_report.txt

          COUNT=$(wc -l < cves_report.txt | tr -d ' ')

          if [ "$COUNT" -gt 0 ]; then
            printf "%-22s | %-10s | %-35s | %-12s | %-65s\n" "CVE ID" "Severity" "Package:Version" "Fixed In" "Description"
            echo "-----------------------|------------|-------------------------------------|-------------|------------------------------------------------------------------"
            while IFS='|' read -r cve sev pkg fix desc; do
              printf "%-22s | %-10s | %-35s | %-12s | %-65s\n" "$cve" "$sev" "$pkg" "$fix" "$desc"
            done < cves_report.txt
            echo ""
            echo "❌ Found $COUNT HIGH/CRITICAL vulnerabilities."
            exit 1
          else
            echo "✅ No HIGH/CRITICAL vulnerabilities detected."
            exit 0
          fi

  notify:
    needs: [ prepare, check-cves ]
    if: ${{ always() && needs.prepare.outputs.is-manual == 'false' && github.event_name == 'schedule' && needs.check-cves.result == 'failure' }}
    uses: ./.github/workflows/infra_discord_hook.yml
    with:
      message: "⚠️ Scheduled CVE checks failed! Review: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
    secrets:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL_CVE }}
